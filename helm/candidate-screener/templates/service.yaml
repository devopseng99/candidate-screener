{{- if .Values.service.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "candidate-screener.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "candidate-screener.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "candidate-screener.selectorLabels" . | nindent 4 }}
{{- end }}
